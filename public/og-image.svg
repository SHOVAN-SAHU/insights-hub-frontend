<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="100" y="215" width="160" height="160" rx="36" fill="#6c63ff"/>
  <path d="M180 240 L224 264 L224 312 L180 336 L136 312 L136 264 Z"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linejoin="round"/>
  <!-- I -->
  <rect x="148" y="268" width="10" height="34" rx="3" fill="white"/>
  <rect x="143" y="268" width="20" height="8" rx="2.5" fill="white"/>
  <rect x="143" y="294" width="20" height="8" rx="2.5" fill="white"/>
  <!-- H -->
  <rect x="169" y="268" width="10" height="34" rx="3" fill="white"/>
  <rect x="169" y="282" width="22" height="7" rx="3" fill="white"/>
  <rect x="181" y="268" width="10" height="34" rx="3" fill="white"/>
  <circle cx="222" cy="342" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="222" cy="342" r="4" fill="white"/>

  <!-- Wordmark -->
  <text x="290" y="300" font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-3">Insights</text>
  <text x="290" y="300" font-family="system-ui, -apple-system, sans-serif"
        font-size="72" font-weight="700" fill="#6c63ff" letter-spacing="-3" dx="426">Hub</text>

  <!-- Tagline -->
  <text x="290" y="350" font-family="system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    AI-powered Document Intelligence Platform
  </text>

  <!-- Bottom domain -->
  <text x="100" y="530" font-family="system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="400" fill="rgba(255,255,255,0.3)">insightshub.in</text>

  <!-- Right decorative pills -->
  <rect x="850" y="220" width="220" height="44" rx="22" fill="rgba(108,99,255,0.15)"
        stroke="rgba(108,99,255,0.4)" stroke-width="1"/>
  <text x="960" y="248" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" fill="rgba(108,99,255,0.9)">Ask AI anything</text>

  <rect x="890" y="280" width="180" height="44" rx="22" fill="rgba(34,211,165,0.1)"
        stroke="rgba(34,211,165,0.3)" stroke-width="1"/>
  <text x="980" y="308" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" fill="rgba(34,211,165,0.8)">RAG-powered</text>

  <rect x="870" y="340" width="220" height="44" rx="22" fill="rgba(245,158,11,0.1)"
        stroke="rgba(245,158,11,0.3)" stroke-width="1"/>
  <text x="980" y="368" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="16" fill="rgba(245,158,11,0.8)">Team collaboration</text>
</svg>
